name: CI

on:
  push:
    branches:
      - main
      - develop
      - release/**
      - hotfix/**
  pull_request:
    branches:
      - main
      - develop
      - release/**
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.25'
  GOLANGCI_LINT_VERSION: 'v1.64.8'

jobs:
  lint:
    name: Code Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Initialize Go Build Environment
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: go.sum

      - name: Execute Static Code Analysis
        uses: golangci/golangci-lint-action@v4
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          install-mode: goinstall
          args: --timeout=5m --issues-exit-code=1
          only-new-issues: ${{ github.event_name == 'pull_request' }}

  test-and-build:
    name: Test & Build
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Initialize Go Build Environment
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: go.sum

      - name: Execute Tiered Test Suite
        run: |
          go test -v \
            -race \
            -covermode=atomic \
            -coverprofile=coverage.out \
            -coverpkg=./... \
            -timeout=10m \
            ./...

      - name: Upload Coverage Report
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.out
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Prepare Build Output Directory
        run: mkdir -p bin

      - name: Build Production Binary (Server)
        run: |
          VERSION=${GITHUB_SHA::8}
          BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          go build -v \
            -trimpath \
            -ldflags "-s -w -X main.Version=$VERSION -X main.BuildTime=$BUILD_TIME" \
            -o bin/server-amd64-linux \
            ./cmd/server
          ./bin/server-amd64-linux --version

      - name: Build Production Binary (Worker)
        run: |
          VERSION=${GITHUB_SHA::8}
          BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          go build -v \
            -trimpath \
            -ldflags "-s -w -X main.Version=$VERSION -X main.BuildTime=$BUILD_TIME" \
            -pgo=auto \
            -o bin/worker-amd64-linux \
            ./cmd/worker
          ./bin/worker-amd64-linux --version

      - name: Archive Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ github.run_id }}
          path: |
            bin/
            config/
            deploy/
          retention-days: 30
          compression-level: 6

      - name: Run Security Scan (Trivy)
        uses: aquasecurity/trivy-action@0.33.1
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Security Scan Results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
        if: ${{ always() && hashFiles('trivy-results.sarif') != '' }}

  release-readiness:
    name: Release Readiness Gate
    runs-on: ubuntu-latest
    needs: test-and-build
    if: startsWith(github.ref, 'refs/heads/release/')

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Initialize Go toolchain for release utilities
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: go.sum

      - name: Validate release branch naming & docs
        run: |
          RELEASE_REF="${GITHUB_REF#refs/heads/release/}"
          if [[ ! "$RELEASE_REF" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "::error::Release branches must follow release/vX.Y.Z"
            exit 1
          fi

          RELEASE_VERSION="${RELEASE_REF#v}"
          if ! grep -Fq "[${RELEASE_VERSION}]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md missing entry for ${RELEASE_VERSION}"
            exit 1
          fi

          if ! grep -q "${RELEASE_REF}" DEVELOPMENT_LOG.md; then
            echo "::error::DEVELOPMENT_LOG.md should mention release target ${RELEASE_REF}"
            exit 1
          fi

      - name: Install git-chglog
        run: |
          go install github.com/git-chglog/git-chglog/cmd/git-chglog@v0.15.4

      - name: Render changelog preview for reviewers
        run: |
          export PATH="$HOME/go/bin:$PATH"
          RELEASE_TAG="${GITHUB_REF#refs/heads/release/}"
          git-chglog --next-tag "$RELEASE_TAG" > release-notes.md

      - name: Upload release preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-notes-${{ github.run_id }}
          path: release-notes.md
          retention-days: 7
