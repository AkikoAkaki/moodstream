name: CI

on:
  push:
    branches:
      - main
      - develop
      - release/**
      - hotfix/**
  pull_request:
    branches:
      - main
      - develop
      - release/**
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.25'
  GOLANGCI_LINT_VERSION: 'v1.64.8'

jobs:
  lint:
    name: Code Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Initialize Go Build Environment
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: go.sum

      - name: Restore golangci-lint analysis cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/golangci-lint
          key: golangci-lint-cache-${{ runner.os }}-${{ hashFiles('go.sum', '.golangci.yml') }}
          restore-keys: |
            golangci-lint-cache-${{ runner.os }}-

      - name: Restore golangci-lint binary cache
        id: golangci-lint-bin-cache
        uses: actions/cache@v4
        with:
          path: ~/go/bin/golangci-lint
          key: golangci-lint-bin-${{ runner.os }}-${{ env.GOLANGCI_LINT_VERSION }}

      - name: Install golangci-lint
        if: steps.golangci-lint-bin-cache.outputs.cache-hit != 'true'
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@${{ env.GOLANGCI_LINT_VERSION }}

      - name: Execute Static Code Analysis
        run: $HOME/go/bin/golangci-lint run --timeout=5m --issues-exit-code=1

  test-and-build:
    name: Test & Build
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Initialize Go Build Environment
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: go.sum

      - name: Execute Tiered Test Suite
        run: |
          go test -v \
            -race \
            -covermode=atomic \
            -coverprofile=coverage.out \
            -coverpkg=./... \
            -timeout=10m \
            ./...

      - name: Upload Coverage Report
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.out
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Prepare Build Output Directory
        run: mkdir -p bin

      - name: Build Production Binary (Server)
        run: |
          VERSION=${GITHUB_SHA::8}
          BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          go build -v \
            -trimpath \
            -ldflags "-s -w -X main.Version=$VERSION -X main.BuildTime=$BUILD_TIME" \
            -o bin/server-amd64-linux \
            ./cmd/server

      - name: Archive Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ github.run_id }}
          path: |
            bin/
            config/
            deploy/
          retention-days: 30
          compression-level: 6

