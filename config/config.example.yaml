# Real-Time Stream Processing Platform — Configuration
# Copy to config.yaml and fill in your values.
# Override any key via env var with prefix DDQ_ (e.g. DDQ_REDIS_ADDR, DDQ_AI_API_KEY).

app:
  name: "async-task-platform"
  env: "local"  # local | dev | prod

server:
  port: 8080      # HTTP server (SSE + REST)
  grpc_port: 9090 # gRPC StreamService

redis:
  addr: "localhost:6379"
  password: ""
  db: 0

stream:
  window_size_seconds: 5   # tumbling window: how often aggregator fires
  max_batch_size: 200      # if window has >N events, randomly sample down to N before LLM call

ai:
  api_key: ""              # required — set via DDQ_AI_API_KEY in production
  base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  model: "qwen-plus"       # qwen-plus | qwen-turbo | qwen-max
