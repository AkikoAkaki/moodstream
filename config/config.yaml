app:
  name: "async-task-platform"
  env: "local" # local, dev, prod

server:
  port: 8080
  grpc_port: 9090

redis:
  addr: "localhost:6379"
  password: ""
  db: 0

stream:
  window_size_seconds: 5  # tumbling window duration
  max_batch_size: 200     # max events sampled per window before LLM call

ai:
  api_key: ""             # set via DDQ_AI_API_KEY env var
  base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  model: "qwen-plus"
